<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
<title>Hackathon QR Admin</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root {
    --primary:#4f46e5;
    --bg:#f8fafc;
    --card:#fff;
    --text:#1e293b;
    --border:#e2e8f0;
    --shadow:0 4px 6px rgba(0,0,0,0.1);
}

*{margin:0;padding:0;box-sizing:border-box;font-family:sans-serif;}
body{background:var(--bg);color:var(--text);}

.page{display:none;padding:16px;max-width:500px;margin:auto;}
.page.active{display:block;}

.header{padding:20px 0;}
.header h1{font-size:22px;}

.btn{
    background:var(--card);
    padding:14px;
    border:1px solid var(--border);
    border-radius:12px;
    margin-top:10px;
    box-shadow:var(--shadow);
}

#reader{
    margin-top:10px;
    border-radius:12px;
    overflow:hidden;
}

.back{
    background:#eef2ff;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="page active">
    <div class="header">
        <h1>Hackathon Admin Panel</h1>
    </div>

    <div class="btn" onclick="show('scan')">📷 Start QR Scanner</div>
    <div class="btn" onclick="show('teams')">👥 Teams</div>
    <div class="btn" onclick="show('storage')">💾 Stored Check-ins</div>
</div>

<!-- SCANNER PAGE -->
<div id="scan" class="page">

    <button class="back" onclick="show('home')">← Back</button>

    <div id="reader"></div>

    <!-- 🔥 REQUIRED RESULT BOX -->
    <div id="resultBox" class="btn">
        Scan QR to see details
    </div>

</div>

<!-- TEAMS -->
<div id="teams" class="page">
    <button class="back" onclick="show('home')">← Back</button>
    <div id="teamList"></div>
</div>

<!-- STORAGE -->
<div id="storage" class="page">
    <button class="back" onclick="show('home')">← Back</button>
    <h3>Saved Check-ins</h3>
    <div id="storeList"></div>
    <button class="btn" onclick="clearStorage()">Clear Storage</button>
</div>

<script>

const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz9XzabS6y5sCY6MbVR6Co5T7ady06vCwOn3GMP9MxfvzaTywr8yDuNWUL0tC6_d0DR/exec";
const SECRET_KEY = "MGHIREMATH0281";

/* =========================
   TEAM DATA
========================= */
let teams = [
    { name:"Cyber Knights", lead:"Alice Smith", table:"T-01" },
    { name:"Code Wizards", lead:"Bob Johnson", table:"T-05" },
    { name:"InnoVate", lead:"Charlie Day", table:"T-12" }
];

/* =========================
   STORAGE
========================= */
let store = JSON.parse(localStorage.getItem("checkins") || "[]");

function saveStore(){
    localStorage.setItem("checkins", JSON.stringify(store));
}

/* =========================
   NAVIGATION
========================= */
let scanner;

function show(page){

    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById(page).classList.add('active');

    if(page === "scan") startScanner();
    else stopScanner();

    if(page === "teams") renderTeams();
    if(page === "storage") renderStore();
}

/* =========================
   SCANNER
========================= */
function startScanner(){

    scanner = new Html5Qrcode("reader");

    scanner.start(
        { facingMode:"environment" },
        { fps:10, qrbox:250 },
        onScan
    );
}

function stopScanner(){
    if(scanner){
        scanner.stop().then(()=>scanner.clear());
        scanner = null;
    }
}

let last = "";

/* =========================
   QR SCAN HANDLER
========================= */
async function onScan(text){

    if(text === last) return;
    last = text;

    document.getElementById("resultBox").innerHTML = "Checking...";

    const url = `${WEBAPP_URL}?qr=${encodeURIComponent(text)}&key=${SECRET_KEY}`;

    try {

        const res = await fetch(url);
        const data = await res.json();

        if(data.status === "success"){

            document.getElementById("resultBox").innerHTML = `
                <div style="color:green;font-weight:bold;font-size:18px;">
                    CHECK-IN SUCCESSFUL
                </div>
                <p><b>Team:</b> ${data.team}</p>
                <p><b>ID:</b> ${data.id}</p>
                <p><b>Leader:</b> ${data.leader}</p>
                <p><b>Track:</b> ${data.track}</p>
                <p><b>Table:</b> ${data.table}</p>
                <p><b>Time:</b> ${data.time}</p>
            `;

        } else if(data.status === "already") {

            document.getElementById("resultBox").innerHTML = `
                <div style="color:orange;font-weight:bold;">
                    ALREADY CHECKED-IN
                </div>
                <p><b>Team:</b> ${data.team}</p>
                <p><b>Time:</b> ${data.time}</p>
            `;

        } else {

            document.getElementById("resultBox").innerHTML = `
                <div style="color:red;font-weight:bold;">
                    INVALID QR
                </div>
            `;
        }

    } catch(err){

        document.getElementById("resultBox").innerHTML =
            "ERROR: " + err;
    }

    setTimeout(()=> last="", 3000);
}

/* =========================
   RENDER TEAMS
========================= */
function renderTeams(){
    document.getElementById("teamList").innerHTML =
    teams.map(t=>`
        <div class="btn">
            <b>${t.name}</b><br>
            Lead: ${t.lead}<br>
            Table: ${t.table}
        </div>
    `).join("");
}

/* =========================
   STORAGE
========================= */
function renderStore(){
    document.getElementById("storeList").innerHTML =
    store.length ? store.map(s=>`
        <div class="btn">
            QR: ${s.qr}<br>
            Time: ${s.time}
        </div>
    `).join("") : "<p>No check-ins yet</p>";
}

function clearStorage(){
    store = [];
    saveStore();
    renderStore();
}

window.onload = ()=> renderTeams();

</script>

</body>
</html>
