<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Admin Terminal</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --bg: #0a0a0a;
            --surface: #171717;
            --border: #262626;
            --text: #ffffff;
            --text-muted: #a3a3a3;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--bg); color: var(--text); overflow-x: hidden; -webkit-tap-highlight-color: transparent; }

        /* Typography & Layout */
        .page { display: none; padding: 20px; min-height: 100vh; }
        .page.active { display: block; animation: slideIn 0.2s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .header { margin-bottom: 30px; }
        .header h1 { font-size: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .header p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }

        /* Icon Container */
        .icon { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; fill: none; }

        /* Cards & Buttons */
        .action-card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 16px; 
            margin-bottom: 12px; 
            display: flex; 
            align-items: center; 
            gap: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-card:active { background: #222; transform: scale(0.98); }
        .action-card.primary { background: var(--primary); border-color: var(--primary); }
        .action-card.primary:active { opacity: 0.9; }

        .back-nav { display: flex; align-items: center; gap: 8px; color: var(--text-muted); text-decoration: none; margin-bottom: 24px; font-size: 14px; cursor: pointer; }

        /* Scanner */
        #reader { border-radius: 16px; overflow: hidden; border: 1px solid var(--border); background: #000; }

        /* POPUP SYSTEM (Bottom Sheet) */
        #popupOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; align-items: flex-end; z-index: 1000;
        }
        #popup {
            background: var(--surface); width: 100%; border-radius: 20px 20px 0 0;
            padding: 24px; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            border-top: 1px solid var(--border);
        }
        #popup.show { transform: translateY(0); }
        
        .status-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
        .status-header h2 { font-size: 18px; font-weight: 700; }
        
        .data-grid { background: #000; padding: 16px; border-radius: 12px; border: 1px solid var(--border); }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; font-family: ui-monospace, monospace; }
        .data-row:last-child { margin-bottom: 0; }
        .label { color: var(--text-muted); }

        .btn-close { width: 100%; margin-top: 20px; padding: 16px; border-radius: 12px; background: #333; color: white; border: none; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

<!-- HOME -->
<div id="home" class="page active">
    <div class="header">
        <h1>Admin Control</h1>
        <p>Real-time Session Management</p>
    </div>

    <div class="action-card primary" onclick="show('scan')">
        <svg class="icon"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
        <span>Initialize Scanner</span>
    </div>

    <div class="action-card" onclick="show('storage')">
        <svg class="icon"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        <span>Check-in Logs</span>
    </div>
</div>

<!-- SCANNER -->
<div id="scan" class="page">
    <div class="back-nav" onclick="show('home')">
        <svg class="icon"><polyline points="15 18 9 12 15 6"/></svg> Back to Dashboard
    </div>
    <div id="reader"></div>
</div>

<!-- TEAMS -->
<div id="teams" class="page">
    <div class="back-nav" onclick="show('home')">
        <svg class="icon"><polyline points="15 18 9 12 15 6"/></svg> Dashboard
    </div>
    <h2 style="margin-bottom:16px">Team List</h2>
    <div id="teamList"></div>
</div>

<!-- LOGS -->
<div id="storage" class="page">
    <div class="back-nav" onclick="show('home')">
        <svg class="icon"><polyline points="15 18 9 12 15 6"/></svg> Dashboard
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
        <h2>Activity Log</h2>
        <button onclick="clearStorage()" style="background:none; color:var(--danger); border:none; font-size:12px;">Clear All</button>
    </div>
    <div id="storeList"></div>
</div>

<!-- POPUP MODAL -->
<div id="popupOverlay">
    <div id="popup">
        <div class="status-header">
            <div id="pIconBox"></div>
            <h2 id="pTitle">Status</h2>
        </div>
        <div id="pContent" class="data-grid"></div>
        <button class="btn-close" onclick="closePopup()">ACKNOWLEDGE</button>
    </div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/library/d/1LEVqJPps3KMu0g5dl8uKXWR1By7Te8LS_nJwUPFIzmCJcRPV6cxyoyD_/3";
const SECRET_KEY = "MGHIREMATH0281";

let scanner;
let lastScan = "";
let history = JSON.parse(localStorage.getItem("admin_logs") || "[]");

/* Navigation */
function show(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    if(id === 'scan') startScanner(); else stopScanner();
    if(id === 'teams') renderTeams();
    if(id === 'storage') renderLogs();
}

/* Icons */
const Icons = {
    check: '<svg class="icon" style="color:var(--success)"><polyline points="20 6 9 17 4 12"/></svg>',
    alert: '<svg class="icon" style="color:var(--warning)"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>',
    error: '<svg class="icon" style="color:var(--danger)"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>'
};

/* Scanner */
async function startScanner() {
    scanner = new Html5Qrcode("reader");
    await scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, onScan);
}

function stopScanner() { if(scanner) { scanner.stop().then(() => { scanner.clear(); scanner = null; }); } }

async function onScan(text) {
    if(text === lastScan) return;
    lastScan = text;
    if(navigator.vibrate) navigator.vibrate(50);

    const res = await fetch(`${WEBAPP_URL}?qr=${encodeURIComponent(text)}&key=${SECRET_KEY}`);
    const data = await res.json();

    if(data.status === "success") {
        triggerPopup("AUTHORIZED", data, "check");
        logActivity(data.team, "SUCCESS");
    } else if(data.status === "already") {
        triggerPopup("DUPLICATE", data, "alert");
    } else {
        triggerPopup("DENIED", {reason: "Invalid Credentials"}, "error");
    }
    setTimeout(() => { lastScan = ""; }, 3000);
}

function triggerPopup(title, data, type) {
    const overlay = document.getElementById("popupOverlay");
    const popup = document.getElementById("popup");
    document.getElementById("pIconBox").innerHTML = Icons[type];
    document.getElementById("pTitle").innerText = title;
    document.getElementById("pTitle").style.color = `var(--${type === 'check' ? 'success' : (type === 'alert' ? 'warning' : 'danger')})`;

    let html = "";
    for(let key in data) {
        if(key !== 'status') html += `<div class="data-row"><span class="label">${key.toUpperCase()}</span><span>${data[key]}</span></div>`;
    }
    document.getElementById("pContent").innerHTML = html;
    overlay.style.display = "flex";
    setTimeout(() => popup.classList.add("show"), 10);
}

function closePopup() {
    document.getElementById("popup").classList.remove("show");
    setTimeout(() => { document.getElementById("popupOverlay").style.display = "none"; }, 300);
}

function logActivity(team, status) {
    history.unshift({ team, status, time: new Date().toLocaleTimeString() });
    localStorage.setItem("admin_logs", JSON.stringify(history.slice(0, 50)));
}

function renderLogs() {
    document.getElementById("storeList").innerHTML = history.map(h => `
        <div class="action-card">
            <div style="flex:1">
                <div style="font-size:14px; font-weight:600">${h.team}</div>
                <div style="font-size:11px; color:var(--text-muted)">${h.time}</div>
            </div>
            <div style="font-size:10px; font-weight:bold; color:var(--success)">${h.status}</div>
        </div>
    `).join('') || '<p style="color:var(--text-muted)">No logs available</p>';
}

function renderTeams() {
    // Replace with real data if needed
    const teams = [{name: "Team VoltTrack", table: "T-01"}, {name: "Team AuditAI", table: "T-02"}];
    document.getElementById("teamList").innerHTML = teams.map(t => `
        <div class="action-card">
            <div style="font-weight:600">${t.name}</div>
            <div style="margin-left:auto; font-size:12px; color:var(--primary)">${t.table}</div>
        </div>
    `).join('');
}

function clearStorage() { history = []; localStorage.removeItem("admin_logs"); renderLogs(); }
</script>
</body>
</html>
