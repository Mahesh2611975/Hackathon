<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>Volunteer Scanner Pro</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    :root {
      --primary: #6366f1;
      --accent: #10b981;
      --bg: #0f172a;
      --card: #1e293b;
      --text: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }

    body {
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 15px;
      min-height: 100vh;
    }

    .container { width: 100%; max-width: 500px; }

    .header {
      padding: 24px 0;
      text-align: center;
    }

    .header h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .header p { color: #94a3b8; font-size: 0.9rem; margin-top: 4px; }

    #reader {
      width: 100% !important;
      border: none !important;
      border-radius: 24px;
      overflow: hidden;
      background: var(--card);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
    }

    /* Styling the html5-qrcode internal buttons */
    #reader button {
      background: var(--primary);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: 600;
      margin: 10px;
      cursor: pointer;
    }

    #result-container {
      margin-top: 20px;
      position: relative;
      border-radius: 24px;
      overflow: hidden;
      background: var(--card);
      height: 400px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    #resultFrame {
      width: 100%;
      height: 100%;
      border: none;
    }

    .status-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent);
      margin-bottom: 15px;
    }

    .scanning-line {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--primary);
      box-shadow: 0 0 15px var(--primary);
      animation: scan 2s infinite;
      z-index: 10;
      display: none;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="status-badge">● SYSTEM ACTIVE</div>
    <h1>Volunteer Scanner</h1>
    <p>Align QR code within the frame</p>
  </div>

  <div id="reader-wrapper" style="position: relative;">
    <div id="reader"></div>
  </div>

  <div id="result-container">
    <iframe id="resultFrame" src="about:blank"></iframe>
  </div>
</div>

<script>
const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbz9XzabS6y5sCY6MbVR6Co5T7ady06vCwOn3GMP9MxfvzaTywr8yDuNWUL0tC6_d0DR/exec";
const SECRET_KEY = "MGHIREMATH0281";
let lastScanned = "";

function onScanSuccess(decodedText) {
  if(decodedText === lastScanned) return;
  
  // Visual/Haptic Feedback
  if (navigator.vibrate) navigator.vibrate(100);
  
  lastScanned = decodedText;
  const finalURL = `${WEBAPP_URL}?qr=${encodeURIComponent(decodedText)}&key=${SECRET_KEY}`;
  
  document.getElementById("resultFrame").src = finalURL;

  setTimeout(() => { lastScanned = ""; }, 3000);
}

const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
  { facingMode: "environment" },
  { fps: 15, qrbox: { width: 250, height: 250 } },
  onScanSuccess
).catch(err => {
  console.error("Camera error", err);
});
</script>
</body>
</html>
